name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

# Cancel superseded PR runs, but let main runs finish (keeps default-branch
# history/badge complete and warm the shared Gradle cache).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Test, lint & build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Run unit tests
        run: ./gradlew test

      - name: Run lint
        run: ./gradlew lint

      # Builds the release variant (R8 + resource shrinking) WITHOUT signing —
      # no keystore secrets needed. Catches minification/ProGuard regressions on
      # every PR instead of only at tag-cut time.
      - name: Build release APK (unsigned, validates R8)
        run: ./gradlew assembleRelease
